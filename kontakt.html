    <header>
        <nav>

            </ul>
        </nav>
    </header>

    <main>
        <form action="send.php" method="post" class="kontaktformular">
            <h2>Kontaktforumlar</h2>
            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required placeholder="Nachname">

                <label for="firstname">Vorname:</label>
                <input type="text" id="firstname" name="firstname" required placeholder="Vorname">
            </div>
            
            <div>
                <label for="mail">E-Mail:</label>
                <input type="email" id="mail" name="mail" required placeholder="abc@xyz.de">
            </div>
            
            <div>
                <label for="message">Nachricht:</label>
                <textarea id="message" name="message" rows="5" required placeholder="Geben Sie hier Ihre Nachricht ein."></textarea>
            </div>

            <div>
                <button type="submit">Senden</button>
            </div>        
        </form>
    </main>

    <div class="footer">
        <ul>
            <li><a href="kontakt.html">Kontakt</a></li>
            <li><a href="impressum.html">Impressum</a></li>
        </ul>
    </div>
